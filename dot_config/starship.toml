# Starship config - Everforest theme, dev-focused
# Two-line prompt with context on top, minimal prompt below

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$golang\
$rust\
$java\
$docker_context\
$aws\
$cmd_duration\
$line_break\
$character"""

# Directory configuration - Everforest cyan
[directory]
truncation_length = 3
truncate_to_repo = true
format = "[ $path]($style)[$read_only]($read_only_style) "
style = "bold #7fbbb3"  # everforest blue

# Git branch - Everforest purple
[git_branch]
symbol = " "
format = "on [$symbol$branch]($style) "
style = "bold #d699b6"  # everforest purple

# Git status - Everforest red
[git_status]
format = '([󰊢 $all_status$ahead_behind]($style) )'
style = "bold #e67e80"  # everforest red

# Node.js
[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold #a7c080"  # everforest green

# Python
[python]
symbol = " "
format = '[${symbol}(${version} )(\($virtualenv\) )]($style)'
style = "bold #dbbc7f"  # everforest yellow

# Go
[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold #83c092"  # everforest aqua

# Rust
[rust]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold #e69875"  # everforest orange

# Java
[java]
symbol = " "
format = "[$symbol($version )]($style)"
style = "bold #e67e80"  # everforest red

# Docker context
[docker_context]
symbol = " "
format = "[$symbol$context ]($style)"
style = "bold #7fbbb3"  # everforest blue
only_with_files = true

# AWS profile
[aws]
symbol = " "
format = '[$symbol($profile )]($style)'
style = "bold #dbbc7f"  # everforest yellow

# Command duration - show if > 500ms
[cmd_duration]
min_time = 500
format = " [$duration]($style) "
style = "bold #9da9a0"  # everforest grey

# Minimal prompt character on second line
[character]
success_symbol = "[❯](bold #a7c080)"  # everforest green
error_symbol = "[❯](bold #e67e80)"    # everforest red

# Username (only show if SSH)
[username]
show_always = false
format = "[$user]($style) "
style_user = "bold #dbbc7f"  # everforest yellow

# Hostname (only show if SSH)
[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #dbbc7f"  # everforest yellow
