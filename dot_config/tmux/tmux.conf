# ============================================
# Bryan's Tmux Config
# ============================================

# ----- Prefix Key -----
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ----- General Settings -----
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -s escape-time 0
set -g focus-events on
set -g status-interval 5
set -g set-titles on
set -g set-titles-string "#S: #W"

# ----- Vim-style Pane Navigation -----
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + hjkl to switch panes without prefix
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# ----- Easy Pane Splitting -----
# | and - are more intuitive than % and "
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Keep current path when creating new windows
bind c new-window -c "#{pane_current_path}"

# ----- Pane Resizing -----
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ----- Window Navigation -----
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Shift + arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# ----- Copy Mode (Vim-style) -----
setw -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ----- Quick Actions -----
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
bind S choose-session
bind W choose-window
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# Synchronize panes toggle (useful for multi-server commands)
bind a setw synchronize-panes \; display "Sync #{?synchronize-panes,ON,OFF}"

# ----- Session Management -----
# Quick session switching
bind s choose-tree -sZ

# ----- Popup Scratch Terminal -----
# Persistent floating terminal (Alt+t to toggle)
bind -n M-t if-shell -F '#{==:#{session_name},scratch}' \
  'detach-client' \
  "display-popup -E -w 80% -h 75% 'tmux new -A -s scratch'"

# ============================================
# Everforest Theme
# ============================================
source-file ~/.config/tmux/everforest.conf

# ----- Plugins (TPM) -----
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ----- Plugin Settings -----
# Resurrect - save/restore sessions
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum - auto save/restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'


# ----- Initialize TPM -----
# (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
